- question: "What year was Lightning AI founded?"
  options:
    - "2017"
    - "2019"
    - "2021"
    - "2023"
  correct: 1
  explanation: "Lightning AI was founded in 2019 by William Falcon during his PhD at NYU."

- question: "Why did Lightning AI and Voltage Park merge?"
  options:
    - "Voltage Park was going bankrupt"
    - "Lightning needed a marketing partner"
    - "Lightning had the software platform, Voltage Park had the GPU infrastructure — together they cover the full stack"
    - "They were competing for the same customers"
  correct: 2
  explanation: "The merger combined Lightning's unified software platform with Voltage Park's GPU infrastructure to create an end-to-end AI platform from GPU to endpoint."

- question: "What is a neo-cloud?"
  options:
    - "A new version of AWS"
    - "A non-hyperscaler cloud provider that offers GPU compute — like us, Lambda, Nebius"
    - "A cloud provider that only serves startups"
    - "An on-premises GPU cluster"
  correct: 1
  explanation: "Neo-clouds are the alternative to hyperscalers (AWS, GCP, Azure). Our differentiator is the software platform on top of the hardware."

- question: "What is the primary GPU server model in our fleet?"
  options:
    - "Nvidia DGX A100"
    - "Dell PowerEdge XE9680 with 8x H100 SXM GPUs"
    - "Supermicro SYS-821GE with 4x A100 GPUs"
    - "Dell PowerEdge R750 with 2x H100 GPUs"
  correct: 1
  explanation: "The Dell PowerEdge XE9680 with 8x H100 SXM GPUs per node is the primary fleet. Newer builds use the XE9780 with B200s."

- question: "What is happening to VPOD (VP On-Demand)?"
